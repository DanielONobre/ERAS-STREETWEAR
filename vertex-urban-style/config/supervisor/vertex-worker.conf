[program:vertex-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/vertex-urban-style/artisan queue:work database --sleep=3 --tries=3 --max-time=3600 --queue=emails,default
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/vertex-urban-style/storage/logs/worker.log
stopwaitsecs=3600

[program:vertex-scheduler]
process_name=%(program_name)s
command=php /var/www/vertex-urban-style/artisan schedule:work
autostart=true
autorestart=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/vertex-urban-style/storage/logs/scheduler.log
